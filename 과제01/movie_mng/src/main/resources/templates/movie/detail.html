<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content})}"
>
  <div th:fragment="content" class="container my-3">
    <h3>영화 상세 정보</h3>

    <div class="card px-4 py-4 my-2">
      <div class="row mb-3">
        <div class="col-4">
          <span class="fw-bold">영화 번호:</span>
          <span th:text="${movie.movieId}"></span>
        </div>
        <div class="col-4">
          <span class="fw-bold">장르:</span>
          <span th:text="${movie.genre}"></span>
        </div>
        <div class="col-4">
          <span class="fw-bold">평점:</span>
          <span th:text="${movie.rating} + ' 점'"></span>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-6">
          <span class="fw-bold">제목:</span>
          <span th:text="${movie.title}"></span>
        </div>
        <div class="col-6">
          <span class="fw-bold">원제:</span>
          <span th:text="${movie.originalTitle}"></span>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-6">
          <span class="fw-bold">감독:</span>
          <span th:text="${movie.director}"></span>
        </div>
        <div class="col-6">
          <span class="fw-bold">출연진:</span>
          <span th:text="${movie.actors}"></span>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-6">
          <span class="fw-bold">개봉일:</span>
          <span
            th:text="${#temporals.format(movie.releaseDate, 'yyyy-MM-dd')}"
          ></span>
        </div>
        <div class="col-6">
          <span class="fw-bold">상영 시간:</span>
          <span th:text="${movie.runningTime} + ' 분'"></span>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-6">
          <span class="fw-bold">등록일:</span>
          <span
            th:text="${#temporals.format(movie.createdAt, 'yyyy-MM-dd HH:mm')}"
          ></span>
        </div>
        <div class="col-6">
          <span class="fw-bold">수정일:</span>
          <span
            th:text="${#temporals.format(movie.updatedAt, 'yyyy-MM-dd HH:mm')}"
          ></span>
        </div>
      </div>

      <hr />

      <div class="row">
        <div class="col">
          <span class="fw-bold d-block mb-2">영화 설명:</span>
          <div
            th:text="${movie.description}"
            style="white-space: pre-wrap"
          ></div>
        </div>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col">
        <div class="text-end">
          <a
            th:href="@{|/movie/edit/${movie.movieId}|}"
            class="btn btn-sm btn-warning"
          >
            <i class="bi bi-pencil-fill"></i> 수정
          </a>

          <form
            th:action="@{|/movie/delete/${movie.movieId}|}"
            method="post"
            style="display: inline"
          >
            <button
              type="submit"
              class="btn btn-sm btn-danger"
              onclick="return confirm('정말 삭제하시겠습니까?');"
            >
              <i class="bi bi-trash-fill"></i> 삭제
            </button>
          </form>

          <a th:href="@{/movie/list}" class="btn btn-sm btn-success">
            <i class="bi bi-list-ul"></i> 목록
          </a>
        </div>
      </div>
    </div>
  </div>
</html>
