<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{})}"
>
  <div th:fragment="content" class="container my-3" style="max-width: 600px">
    <h3 class="mb-4">로그인</h3>

    <!-- <div th:if="${param.error}" class="alert alert-danger">
      아이디 또는 비밀번호가 올바르지 않습니다
    </div> -->

    <form th:action="@{/user/login}" th:object="${userLoginForm}" method="post">
      <div class="mb-3">
        <label for="loginId" class="form-label">아이디</label>
        <input
          type="text"
          id="loginId"
          th:field="*{loginId}"
          class="form-control"
        />
        <div class="text-danger mt-1" th:errors="*{loginId}"></div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">패스워드</label>
        <input
          type="password"
          id="password"
          th:field="*{password}"
          class="form-control"
        />
        <div class="text-danger mt-1" th:errors="*{password}"></div>
      </div>

      <button type="submit" class="btn btn-sm btn-primary">
        <i class="bi bi-door-open-fill"></i> 로그인
      </button>
      <a
        th:href="@{/oauth2/authorization/google}"
        class="btn btn-sm btn-primary"
      >
        <i class="bi bi-google"></i> 구글로그인
      </a>
      <a th:href="@{/user/join}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-person-fill"></i>
        회원가입
      </a>
    </form>
  </div>
</html>
