<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{})}"
>
  <div th:fragment="content" class="container my-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>스터디포스트 리스트</h3>
    </div>

    <div class="row">
      <div class="col">
        <!-- 게시판 목록-->
        <table class="table">
          <thead class="table-dark">
            <tr>
              <th>번호</th>
              <th>카테고리</th>
              <th>제목</th>
              <th>작성자</th>
              <th>모집인원</th>
              <th>상태</th>
              <th>조회수</th>
              <th>작성일</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(response.dtoList)}">
              <td colspan="8" class="text-center">게시글이 없습니다</td>
            </tr>
            <tr th:each="post : ${response.dtoList}">
              <td th:text="${post.postId}"></td>
              <td th:text="${post.categoryName}"></td>
              <td>
                <a
                  th:href="@{/studypost/detail/{id}(id=${post.postId})}"
                  th:text="${post.title}"
                ></a>
                <span th:if="${post.status == 'CLOSED'}" class="badge bg-danger"
                  >모집마감</span
                >
                <span th:if="${post.status == 'OPEN'}" class="badge bg-success"
                  >모집중</span
                >
              </td>
              <td th:text="${post.writerName}"></td>
              <td th:text="${post.maxMembers}"></td>
              <td th:text="${post.status}"></td>
              <td th:text="${post.viewCount}"></td>
              <td
                th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}"
              ></td>
            </tr>
          </tbody>
        </table>

        <!-- 게시글쓰기 버튼 영역 -->
        <div class="row">
          <div class="col-9">
            <!-- 페이지네이션 -->
            <nav>
              <ul class="pagination pagination-sm justify-content-center">
                <li class="page-item" th:if="${response.prev}">
                  <a
                    class="page-link"
                    th:href="@{/studypost/list(page=${response.startPage - 1})}"
                    >◀</a
                  >
                </li>

                <li
                  class="page-item"
                  th:each="pageNum : ${#numbers.sequence(response.startPage, response.endPage)}"
                  th:classappend="${pageNum == response.currentPage} ? 'active'"
                >
                  <a
                    class="page-link"
                    th:href="@{/studypost/list(page=${pageNum})}"
                    th:text="${pageNum}"
                  ></a>
                </li>

                <li class="page-item" th:if="${response.next}">
                  <a
                    class="page-link"
                    th:href="@{/studypost/list(page=${response.endPage + 1})}"
                    >▶</a
                  >
                </li>
              </ul>
            </nav>
          </div>
          <div class="col-3">
            <div class="text-end">
              <a th:href="@{/studypost/create}" class="btn btn-sm btn-success">
                <i class="bi bi-pencil"></i> 글쓰기</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</html>
