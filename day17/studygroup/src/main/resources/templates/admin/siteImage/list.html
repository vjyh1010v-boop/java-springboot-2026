<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{})}"
>
  <div th:fragment="content" class="container my-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>사이트이미지 관리 리스트</h3>
    </div>

    <div class="row">
      <div class="col">
        <table class="table">
          <thead class="table-dark">
            <tr>
              <th class="text-center">ID</th>
              <th class="text-center">미리보기</th>
              <th class="text-center">이미지키</th>
              <th class="text-center">경로</th>
              <th class="text-center">사용유무</th>
              <th class="text-center">등록일</th>
              <th class="text-center">관리</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="img : ${imageList}">
              <td th:text="${img.id}" class="text-end"></td>
              <td>
                <img
                  th:src="@{${img.imagePath}}"
                  style="width: 120px; height: 80px; object-fit: cover"
                />
              </td>
              <td th:text="${img.imageKey}"></td>
              <td th:text="${img.imagePath}"></td>
              <td th:text="${img.useYn}" class="text-center"></td>
              <td
                th:text="${#temporals.format(img.createdAt, 'yyyy-MM-dd')}"
              ></td>
              <td class="text-end">
                <!-- <a
                  th:href="@{/admin/image/edit/{id}(id=${img.id})}"
                  class="btn btn-sm btn-warning"
                >
                  <i class="bi bi-pencil"></i>
                  수정
                </a> -->

                <form
                  th:action="@{/admin/image/delete/{id}(id=${img.id})}"
                  method="post"
                  style="display: inline"
                >
                  <button
                    type="submit"
                    class="btn btn-sm btn-danger"
                    onclick="return confirm('정말 삭제하시겠습니까?');"
                  >
                    <i class="bi bi-trash-fill"></i>
                    삭제
                  </button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="text-end">
      <a th:href="@{/admin/image/create}" class="btn btn-sm btn-primary">
        <i class="bi bi-pencil"></i> 등록
      </a>
      <a th:href="@{/}" class="btn btn-sm btn-success">
        <i class="bi bi-house-fill"></i>
        홈</a
      >
    </div>
  </div>
</html>
