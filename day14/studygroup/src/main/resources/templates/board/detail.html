<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{})}"
>
  <div th:fragment="content" class="container my-3">
    <h3>게시판 상세</h3>

    <div class="card px-2 py-2 my-2">
      <div class="row">
        <div class="col-2">
          <span class="label">번호:</span>
          <span th:text="${board.boardId}"></span>
        </div>
        <div class="col-7">
          <span class="label">제목:</span>
          <span th:text="${board.title}"></span>
        </div>
        <div class="col-3">
          <span class="label">작성자:</span>
          <span th:text="${board.name} + '[' + ${board.writer} + ']'"></span>
        </div>
      </div>

      <div class="row">
        <div class="col">
          <span class="label">작성일:</span>
          <span
            th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"
          ></span>
        </div>
        <div class="col">
          <span class="label">수정일:</span>
          <span
            th:text="${#temporals.format(board.updatedAt, 'yyyy-MM-dd HH:mm')}"
          ></span>
        </div>
      </div>

      <div class="row">
        <div class="col">
          <span class="label">내용:</span>
          <div th:utext="${board.content}"></div>
        </div>
      </div>
    </div>

    <!-- 게시판 버튼 영역 -->
    <div class="row">
      <div class="col">
        <div class="text-end">
          <span>
            <a
              th:if="${session.loginUser != null and session.loginUser.loginId == board.writer}"
              th:href="@{|/board/edit/${board.boardId}|}"
              class="btn btn-sm btn-warning"
            >
              <i class="bi bi-pencil-fill"></i>
              수정
            </a>

            <!-- HTML 각 태그객체를 핸들링하려면 id가 필요 -->
            <form
              id="deleteForm"
              th:action="@{|/board/delete/${board.boardId}|}"
              method="post"
              style="display: inline"
            >
              <!-- data-bs-toggle : data- html에서 부가적으로 만든 태그 bs(bootstrap 약자), toggle 온오프기능.
                   즉, 부트스트랩이 만든 토글기능으로 동작할 방법
                   modal : 자식창이 동작하는 동안 부모창을 건드릴 수 없는 기능
                   data-bs-target : 모달창으로 띄울 id가 deleteModal  // th:if="${session.loginUser != null and session.loginUser.loginId == board.writer}" <- 자기 글만 삭제 또는 수정 등 할 수 있도록 하는 코드
              -->
              <!--
              th:if 에서 사용자 로그인 여부와 사용자 아이디 일치여부, 관리자 권한(ROLE_ADMIN)에게 권한 적용
                 -->
              <button
                th:if="${session.loginUser != null and (session.loginUser.loginId == board.writer or session.loginUser.role == 'ROLE_ADMIN')}"
                type="button"
                class="btn btn-sm btn-danger"
                data-bs-toggle="modal"
                data-bs-target="#deleteModal"
              >
                <i class="bi bi-trash-fill"></i>
                삭제
              </button>
            </form>
          </span>

          <a th:href="@{/board/list}" class="btn btn-sm btn-success">
            <i class="bi bi-list-ul"></i> 목록
          </a>
        </div>
      </div>
    </div>

    <h4>댓글 목록</h4>
    <!-- table-bordered : 테이블 경계선 -->
    <table class="table mt-3">
      <thead class="table-dark">
        <tr>
          <th style="width: 10%">번호</th>
          <th style="width: 45%">댓글 내용</th>
          <th style="width: 15%">작성자</th>
          <th style="width: 20%">작성일</th>
          <th style="width: 10%">삭제</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(replyList)}">
          <td colspan="5" class="text-center">댓글이 없습니다.</td>
        </tr>
        <tr th:each="reply : ${replyList}">
          <td th:text="${reply.replyId}"></td>
          <td th:text="${reply.replyContent}"></td>
          <td th:text="${reply.replyWriter}"></td>
          <td
            th:text="${#temporals.format(reply.createdAt, 'yyyy-MM-dd HH:mm')}"
          ></td>
          <td>
            <form th:action="@{|/reply/delete/${reply.replyId}|}" method="post">
              <input type="hidden" name="boardId" th:value="${board.boardId}" />
              <button type="submit" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash-fill"></i>
                삭제
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
    <!-- 댓글 작성 영역 -->
    <div class="row">
      <div class="col">
        <form
          th:action="@{/reply/create}"
          th:object="${replyForm}"
          method="post"
          class="mt-3"
        >
          <input type="hidden" th:field="*{boardId}" />

          <div class="mb-3">
            <label for="replyWriter" class="form-label">작성자</label>
            <input
              type="text"
              id="replyWriter"
              th:field="*{replyWriter}"
              class="form-control"
            />
            <div
              class="error alert alert-danger"
              th:if="${#fields.hasErrors('replyWriter')}"
              th:errors="*{replyWriter}"
            ></div>
          </div>

          <div class="mb-3">
            <label for="replyContent" class="form-label">댓글 내용</label>
            <textarea
              id="replyContent"
              th:field="*{replyContent}"
              class="form-control"
              rows="2"
            ></textarea>
            <div
              class="error alert alert-danger"
              th:if="${#fields.hasErrors('replyContent')}"
              th:errors="*{replyContent}"
            ></div>
          </div>

          <div class="text-end">
            <button type="submit" class="btn btn-sm btn-primary">
              <i class="bi bi-floppy"></i>
              댓글 등록
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- 이 태그는 버튼 누를시에만 표시 -->
    <!-- 삭제 확인 모달 -->
    <div
      class="modal fade"
      id="deleteModal"
      tabindex="-1"
      aria-labelledby="deleteModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="deleteModalLabel">삭제 확인</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">삭제하시겠습니까?</div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-sm btn-danger"
              id="confirmDeleteBtn"
            >
              예
            </button>

            <button
              type="button"
              class="btn btn-sm btn-secondary"
              data-bs-dismiss="modal"
            >
              아니오
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 자바스크립트 영역 -->
    <script>
      // confirmDeleteBtn '예'를 클릭하면
      // 전체 페이지에서 deleteForm 아이디 폼태그를 찾아서 submit을 발동
      document
        .getElementById("confirmDeleteBtn")
        .addEventListener("click", function () {
          document.getElementById("deleteForm").submit();
        });
    </script>
  </div>
</html>
