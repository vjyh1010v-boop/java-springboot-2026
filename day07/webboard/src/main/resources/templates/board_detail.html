<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content})}"
>
  <div th:fragment="content" class="container my-3">
    <div class="row">
      <div class="col">
        <!-- 게시판 상세글 영역 -->
        <div class="card my-3 shadow-sm">
          <div class="card-body">
            <!-- 게시판 요소 위치-->
            <h4 th:text="${board.title}" class="card-title"></h4>

            <p th:text="${board.content}" class="card-text"></p>

            <div class="d-flex justify-content-end">
              <div class="badge bg-info text-dark p-1 text-start">
                <p
                  th:text="${#temporals.format(board.createDate, 'yyyy-MM-dd HH:mm')}"
                ></p>
              </div>
            </div>
          </div>
        </div>

        <!-- 댓글 수 표시 영역-->
        <div class="webboard-reply">
          <h6 th:text="|${#lists.size(board.replyList)}개 댓글|"></h6>
        </div>

        <!-- 댓글 리스트 영역-->
        <div class="card my-2 shadow-sm" th:each="reply : ${board.replyList}">
          <div class="card-body">
            <div class="card-text" th:text="${reply.content}"></div>
            <div class="d-flex justify-content-end">
              <div class="badge bg-info text-dark p-1 text-start">
                <div
                  th:text="${#temporals.format(reply.createDate, 'yyyy-MM-dd')}"
                ></div>
              </div>
            </div>
          </div>
        </div>

        <!-- 댓글 작성영역-->
        <form
          th:action="@{|/reply/create/${board.bno}|}"
          th:object="${replyForm}"
          method="post"
        >
          <!-- 댓글 내용입력 검증 -->
          <div
            class="alert alert-danger"
            role="alert"
            th:if="${#fields.hasAnyErrors()}"
          >
            <div
              th:each="error : ${#fields.allErrors()}"
              th:text="${error}"
            ></div>
          </div>

          <!-- 댓글내용 입력 영역 -->
          <input th:field="*{content}" type="text" class="form-control" />
          <div class="text-end my-2">
            <button type="submit" class="btn btn-sm btn-primary">
              <i class="bi bi-floppy"></i> 댓글 저장
            </button>
          </div>
        </form>

        <!-- 게시판 목록 링크 -->
        <div class="text-end">
          <a
            th:href="@{|/board/modify/${board.bno}|}"
            class="btn btn-sm btn-warning"
            ><i class="bi bi-pencil"></i>수정</a
          >

          <!-- 삭제 버튼-->
          <a
            th:href="@{|/board/delete/${board.bno}|}"
            class="btn btn-sm btn-danger"
          >
            <i class="bi bi-trash-fill"></i> 삭제
          </a>

          <a href="/board/list" class="btn btn-sm btn-secondary">
            <i class="bi bi-list"></i> 리스트</a
          >
        </div>
      </div>
    </div>
  </div>
</html>
