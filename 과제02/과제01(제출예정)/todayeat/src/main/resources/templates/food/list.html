<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>오늘 뭐 먹지? 목록</title>
    <link rel="stylesheet" th:href="@{/css/food-list.css}" />
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">오늘 뭐 먹지? 기록장</h1>
        <div class="page-subtitle">먹었던 음식들을 확인해보세요.</div>
      </div>

      <div class="sort-group">
        <a
          th:href="@{/food/list(orderBy='category')}"
          class="sort-link"
          th:classappend="${currentOrder == 'category'} ? 'active' : ''"
        >
          카테고리순
        </a>
        <a
          th:href="@{/food/list(orderBy='rating')}"
          class="sort-link"
          th:classappend="${currentOrder == 'rating'} ? 'active' : ''"
        >
          평점순
        </a>
        <a
          th:href="@{/food/list(orderBy='eatDate')}"
          class="sort-link"
          th:classappend="${currentOrder == 'eatDate' or currentOrder == null} ? 'active' : ''"
        >
          날짜순
        </a>
      </div>

      <div class="card" th:if="${!#lists.isEmpty(foods)}">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th
                  th:classappend="${currentOrder == 'name' ? 'highlight-column' : ''}"
                >
                  음식명
                </th>
                <th
                  th:classappend="${currentOrder == 'category' ? 'highlight-column' : ''}"
                >
                  카테고리
                </th>
                <th
                  th:classappend="${currentOrder == 'rating' ? 'highlight-column' : ''}"
                >
                  평점
                </th>
                <th
                  th:classappend="${currentOrder == 'eatDate' ? 'highlight-column' : ''}"
                >
                  날짜
                </th>
                <th>메모</th>
                <th class="col-action">관리</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="food : ${foods}">
                <td
                  class="food-name"
                  th:classappend="${currentOrder == 'name' ? 'highlight-column' : ''}"
                  th:text="${food.name}"
                >
                  비빔밥
                </td>
                <td
                  th:classappend="${currentOrder == 'category' ? 'highlight-column' : ''}"
                >
                  <span class="category-badge" th:text="${food.category}"
                    >한식</span
                  >
                </td>
                <td
                  class="rating"
                  th:classappend="${currentOrder == 'rating' ? 'highlight-column' : ''}"
                  th:text="${'★'.repeat(food.rating)}"
                >
                  ★★★★★
                </td>
                <td
                  th:classappend="${currentOrder == 'eatDate' ? 'highlight-column' : ''}"
                  th:text="${food.eatDate}"
                >
                  2026-04-23
                </td>
                <td><div class="memo" th:text="${food.memo}">맛있어요</div></td>
                <td>
                  <div style="display: flex; gap: 8px; justify-content: center">
                    <button
                      type="button"
                      class="btn-edit"
                      th:onclick="'openEditModal(' + ${food.id} + ')'"
                    >
                      수정
                    </button>
                    <a
                      th:href="@{/food/delete/{id}(id=${food.id})}"
                      class="btn-delete"
                      onclick="return confirm('정말 삭제하시겠습니까?');"
                    >
                      삭제
                    </a>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card empty-box" th:if="${#lists.isEmpty(foods)}">
        <div class="empty-title">아직 기록된 음식이 없습니다</div>
        <div class="empty-text">우측 하단의 + 버튼을 눌러 바로 등록하세요.</div>
      </div>
    </div>

    <!-- 플로팅 + 버튼 -->
    <button
      type="button"
      class="fab"
      onclick="openAddModal()"
      title="음식 추가"
    >
      +
    </button>

    <!-- 등록 모달 -->
    <div id="foodModal" class="modal">
      <div class="modal-card">
        <button type="button" class="close-btn" onclick="closeModal()">
          &times;
        </button>

        <h2 class="modal-title">먹은 음식 기록하기</h2>
        <p class="modal-subtitle">이 페이지에서 바로 등록할 수 있습니다.</p>

        <form th:action="@{/food/add}" method="post">
          <div class="form-group">
            <label for="name">음식명</label>
            <input
              id="name"
              type="text"
              name="name"
              placeholder="예: 비빔밥"
              required
            />
          </div>

          <div class="form-group">
            <label for="category">종류</label>
            <select id="category" name="category">
              <option value="한식">한식</option>
              <option value="일식">일식</option>
              <option value="중식">중식</option>
              <option value="양식">양식</option>
              <option value="기타">기타</option>
            </select>
          </div>

          <div class="form-group">
            <label for="rating">평점</label>
            <input
              id="rating"
              type="number"
              name="rating"
              min="1"
              max="5"
              value="5"
            />
          </div>

          <div class="form-group">
            <label for="eatDate">날짜</label>
            <input id="eatDate" type="date" name="eatDate" required />
          </div>

          <div class="form-group">
            <label for="memo">메모</label>
            <textarea
              id="memo"
              name="memo"
              placeholder="간단한 후기를 적어보세요."
            ></textarea>
          </div>

          <div class="button-row">
            <button type="submit" class="btn btn-primary">저장</button>
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeModal()"
            >
              취소
            </button>
          </div>
        </form>
      </div>
    </div>

    <script th:src="@{/js/food-list.js}"></script>
  </body>
</html>
